<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1" />
    <meta name="theme-color" content="#ffffff" />
    <title>p!ng</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      html, body {
        height: 100%;
        background: #0d0d14;
        font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      }

      body {
        display: flex;
        justify-content: center;
        align-items: flex-start;
        padding: 36px 0 60px;
        min-height: 100%;
      }

      .phone-wrap {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 18px;
        flex-shrink: 0;
      }

      .phone-frame {
        width: 393px;
        height: 852px;
        border-radius: 52px;
        background: #111;
        padding: 14px;
        flex-shrink: 0;
        position: relative;
        box-shadow:
          0 0 0 1.5px #2a2a2a,
          0 0 0 3px #111,
          0 50px 140px rgba(0, 0, 0, 0.85),
          inset 0 0 0 1px #3a3a3a;
      }

      /* 측면 버튼들 */
      .phone-frame::before {
        content: '';
        position: absolute;
        left: -3px;
        top: 120px;
        width: 3px;
        height: 36px;
        background: #2a2a2a;
        border-radius: 2px 0 0 2px;
        box-shadow: 0 50px 0 #2a2a2a, 0 96px 0 #2a2a2a;
      }
      .phone-frame::after {
        content: '';
        position: absolute;
        right: -3px;
        top: 164px;
        width: 3px;
        height: 72px;
        background: #2a2a2a;
        border-radius: 0 2px 2px 0;
      }

      .phone-screen {
        width: 100%;
        height: 100%;
        border-radius: 40px;
        overflow: hidden;
        background: #fff;
        position: relative;
      }

      /* Dynamic Island */
      .phone-island {
        position: absolute;
        top: 12px;
        left: 50%;
        transform: translateX(-50%);
        width: 120px;
        height: 34px;
        background: #000;
        border-radius: 20px;
        z-index: 100;
        pointer-events: none;
      }

      /* 홈 인디케이터 */
      .phone-home-bar {
        position: absolute;
        bottom: 8px;
        left: 50%;
        transform: translateX(-50%);
        width: 134px;
        height: 5px;
        background: rgba(0, 0, 0, 0.2);
        border-radius: 3px;
        z-index: 100;
        pointer-events: none;
      }

      #root {
        width: 100%;
        height: 100%;
        overflow: hidden;
        position: relative;
      }

      .phone-label {
        color: rgba(255, 255, 255, 0.2);
        font-size: 12px;
        letter-spacing: 0.08em;
        font-weight: 500;
        user-select: none;
      }

      /* 실제 모바일에선 프레임 없이 풀스크린 */
      @media (max-width: 480px) {
        html, body {
          background: #fff;
          padding: 0;
          height: 100%;
          display: block;
        }
        .phone-wrap {
          width: 100%;
          height: 100%;
          gap: 0;
        }
        .phone-frame {
          width: 100%;
          height: 100%;
          border-radius: 0;
          padding: 0;
          box-shadow: none;
          background: #fff;
        }
        .phone-frame::before,
        .phone-frame::after { display: none; }
        .phone-screen {
          border-radius: 0;
        }
        .phone-island,
        .phone-home-bar,
        .phone-label { display: none; }
        #root { overflow: auto; }
      }
    </style>
  </head>
  <body>
    <div class="phone-wrap">
      <div class="phone-frame">
        <div class="phone-screen">
          <div class="phone-island"></div>
          <div id="root"></div>
          <div class="phone-home-bar"></div>
        </div>
      </div>
      <span class="phone-label">p!ng · preview</span>
    </div>
  </body>
</html>
