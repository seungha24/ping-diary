<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1" />
    <title>p!ng</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      html {
        background: #0d0d14;
        min-height: 100%;
      }
      body {
        background: #0d0d14;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 36px 0 64px;
        gap: 16px;
      }

      /* в”Җв”Җ нҸ° мҷёкҙҖ в”Җв”Җ */
      .phone-outer {
        width: 393px;
        height: 852px;
        flex-shrink: 0;
        border-radius: 52px;
        background: #111;
        padding: 13px;
        position: relative;
        box-shadow:
          0 0 0 1.5px #333,
          0 0 0 3.5px #111,
          0 60px 160px rgba(0,0,0,0.9);
      }

      /* мҷјмӘҪ ліјлҘЁ/л¬ҙмқҢ лІ„нҠј */
      .phone-outer::before {
        content: '';
        position: absolute;
        left: -3.5px; top: 112px;
        width: 3.5px; height: 32px;
        background: #2e2e2e;
        border-radius: 2px 0 0 2px;
        box-shadow: 0 52px 0 #2e2e2e, 0 100px 0 #2e2e2e;
      }
      /* мҳӨлҘёмӘҪ м „мӣҗ лІ„нҠј */
      .phone-outer::after {
        content: '';
        position: absolute;
        right: -3.5px; top: 172px;
        width: 3.5px; height: 76px;
        background: #2e2e2e;
        border-radius: 0 2px 2px 0;
      }

      /* в”Җв”Җ нҷ”л©ҙ мҳҒм—ӯ в”Җв”Җ
         transform: translate(0) м Ғмҡ© вҶ’ position:fixed мһҗмӢқл“Өмқҳ кё°мӨҖм җмқҙ лҗЁ
         вҶ’ RN Webмқҙ fixedлЎң л¶ҷм—¬лҸ„ мқҙ м•Ҳм—җ к°Үнһҳ */
      .phone-screen {
        width: 100%;
        height: 100%;
        border-radius: 40px;
        overflow: hidden;
        background: #fff;
        position: relative;
        /* н•өмӢ¬: transformмқҙ мһҲмңјл©ҙ fixed мһҗмӢқл“ӨлҸ„ м—¬кё° кё°мӨҖмңјлЎң л°°м№ҳлҗЁ */
        transform: translate(0, 0);
        isolation: isolate;
      }

      /* Dynamic Island */
      .phone-island {
        position: absolute;
        top: 11px;
        left: 50%;
        transform: translateX(-50%);
        width: 120px;
        height: 34px;
        background: #000;
        border-radius: 20px;
        z-index: 9999;
        pointer-events: none;
      }

      /* нҷҲ мқёл””мјҖмқҙн„° */
      .phone-home {
        position: absolute;
        bottom: 8px;
        left: 50%;
        transform: translateX(-50%);
        width: 134px;
        height: 5px;
        background: rgba(0,0,0,0.18);
        border-radius: 3px;
        z-index: 9999;
        pointer-events: none;
      }

      #root {
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      .phone-label {
        color: rgba(255,255,255,0.2);
        font-size: 12px;
        font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        letter-spacing: 0.1em;
        font-weight: 500;
        user-select: none;
      }

      /* в”Җв”Җ мӢӨм ң лӘЁл°”мқј: н”„л Ҳмһ„ м ңкұ° в”Җв”Җ */
      @media (max-width: 480px) {
        html { background: #fff; }
        body {
          background: #fff;
          padding: 0;
          display: block;
          min-height: 100%;
        }
        .phone-outer {
          width: 100vw;
          height: 100dvh;
          border-radius: 0;
          padding: 0;
          box-shadow: none;
          background: #fff;
        }
        .phone-outer::before,
        .phone-outer::after { display: none; }
        .phone-screen { border-radius: 0; }
        .phone-island,
        .phone-home,
        .phone-label { display: none; }
        #root { overflow: visible; }
      }
    </style>
  </head>
  <body>
    <div class="phone-outer">
      <div class="phone-screen">
        <div class="phone-island"></div>
        <div id="root"></div>
        <div class="phone-home"></div>
      </div>
    </div>
    <span class="phone-label">p!ng В· preview</span>
  </body>
</html>
